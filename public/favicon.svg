<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" shape-rendering="crispEdges">
    <rect width="22" height="22" fill="#000"/>
    <g fill="#fff">
        <!-- N: left bar -->
        <rect x="2" y="2" width="2" height="18"/>
        <!-- N: right bar -->
        <rect x="8" y="2" width="2" height="18"/>
        <!-- N: stepped diagonal (3 chunks, 2x4 each) -->
        <rect x="4" y="5" width="2" height="4"/>
        <rect x="5" y="9" width="2" height="4"/>
        <rect x="6" y="13" width="2" height="4"/>
        <!-- L: vertical -->
        <rect x="12" y="2" width="2" height="18"/>
        <!-- L: base -->
        <rect x="14" y="18" width="6" height="2"/>
    </g>
</svg>
